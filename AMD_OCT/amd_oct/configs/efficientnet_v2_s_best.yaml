defaults:
  - default
  - override model: efficientnet_v2_s_trimodal
  - override loss: cross_entropy
  - _self_

run_name: efficientnet_v2_s_best

data:
  image_size: 420
  batch_size: 12
  modality: trimodal

model:
  embed_dim: 768
  tabular_encoder:
    name: attention
    n_heads: 6
    dropout: 0.3

loss:
  name: cross_entropy
  class_weights: true

training:
  epochs: 5
  lr: 1.0e-4
  weight_decay: 1.0e-2
  monitor: score
  scheduler:
    name: cosine
    step: epoch
